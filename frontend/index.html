<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe — Sign In</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .auth-bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at top right, rgba(255,107,0,0.15) 0%, transparent 60%),
                  radial-gradient(ellipse at bottom left, rgba(255,140,0,0.1) 0%, transparent 60%),
                  var(--bg);
      z-index: -1;
    }
    .auth-container { position: relative; }
    .auth-theme-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="auth-bg"></div>
  <button class="auth-theme-btn" onclick="toggleTheme()" id="themeBtn">☀️ Light Mode</button>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">🔥</div>
        <h1><span>Vibe</span>Connect</h1>
        <p>Share moments, connect with people</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" onclick="switchTab('register')">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="password-wrapper">
            <input type="password" id="loginPassword" placeholder="Your password" required />
            <button type="button" class="toggle-pw" onclick="togglePw('loginPassword', this)">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div id="loginError" class="form-error" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
          Sign In
        </button>
      </form>

      <!-- REGISTER FORM -->
      <form id="registerForm" style="display:none" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="regUsername" placeholder="Choose a username" required minlength="3" maxlength="30" />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="regEmail" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="password-wrapper">
            <input type="password" id="regPassword" placeholder="Min. 8 characters" required minlength="8" />
            <button type="button" class="toggle-pw" onclick="togglePw('regPassword', this)">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" id="regConfirm" placeholder="Repeat your password" required />
            <button type="button" class="toggle-pw" onclick="togglePw('regConfirm', this)">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div id="registerError" class="form-error" style="display:none"></div>
        <div id="registerSuccess" class="form-success" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
          Create Account
        </button>
      </form>
    </div>

    <!-- GUEST OPTION -->
    <div style="text-align:center;margin-top:16px">
      <div style="display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:12px">
        <div style="flex:1;height:1px;background:var(--border)"></div>
        <span style="color:var(--text-muted);font-size:13px">or</span>
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>
      <a href="/feed?guest=1" class="btn btn-ghost btn-full" style="display:flex;align-items:center;justify-content:center;gap:8px;border:1.5px solid var(--border)">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Browse as Guest
      </a>
      <p style="font-size:12px;color:var(--text-muted);margin-top:8px">View public posts — no account needed</p>
    </div>
  </div>

  <script>
    const saved = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    updateThemeBtn(saved);

    function updateThemeBtn(theme) {
      const btn = document.getElementById('themeBtn');
      if (btn) btn.textContent = theme === 'dark' ? '☀️ Light Mode' : '🌙 Dark Mode';
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeBtn(next);
    }

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    }

    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.innerHTML = isText
        ? `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
        : `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('loginError');
      errEl.style.display = 'none';
      btn.textContent = 'Signing in...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = data.user.role === 'admin' ? '/admin' : '/feed';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      const errEl = document.getElementById('registerError');
      const sucEl = document.getElementById('registerSuccess');
      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      const pw = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirm').value;
      if (pw !== confirm) {
        errEl.textContent = 'Passwords do not match';
        errEl.style.display = 'block';
        return;
      }

      btn.textContent = 'Creating account...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('regUsername').value,
            email: document.getElementById('regEmail').value,
            password: pw
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        sucEl.textContent = 'Account created! Redirecting...';
        sucEl.style.display = 'block';
        setTimeout(() => window.location.href = '/feed', 1000);
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    }

    if (localStorage.getItem('token')) {
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      window.location.href = user.role === 'admin' ? '/admin' : '/feed';
    }
  </script>
</body>
</html>
