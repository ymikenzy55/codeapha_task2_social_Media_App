<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe — Profile</title>
  <link rel="stylesheet" href="css/style.css" />
  <script>
    function handleAvatarError(el) {
      el.style.display = 'none';
      var fb = el.nextElementSibling;
      if (fb && fb.classList && fb.classList.contains('avatar-fallback')) {
        fb.style.display = 'flex';
        if (!fb.textContent.trim()) fb.textContent = '?';
      }
    }
    (function() {
      var t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <div class="app-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">🔥</div>
        <h2><span>Vibe</span>Connect</h2>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-title">Main</div>
        <a class="nav-link" href="/feed">
          <span class="nav-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </span>
          Feed
        </a>
        <a class="nav-link" href="/feed#explore" onclick="window.location.href='/feed'">
          <span class="nav-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </span>
          Explore
        </a>
        <a class="nav-link active" id="profileNavLink" href="#">
          <span class="nav-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </span>
          My Profile
        </a>
        <div class="nav-section-title" style="margin-top:8px">Settings</div>
        <a class="nav-link" href="#" onclick="openEditProfile()">
          <span class="nav-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          </span>
          Edit Profile
        </a>
        <a class="nav-link" id="adminNavLink" href="/admin" style="display:none">
          <span class="nav-icon">🛡️</span>
          Admin Panel
        </a>
        <a class="nav-link" href="#" onclick="logout()">
          <span class="nav-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </span>
          Log Out
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user" id="sidebarUser" onclick="goToMyProfile()">
          <img class="user-avatar" id="sidebarAvatar" src="" alt="avatar" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
          <div class="user-avatar avatar-fallback" id="sidebarAvatarFallback" style="display:none;width:36px;height:36px;border-radius:50%;font-size:14px;border:2px solid var(--primary)"></div>
          <div class="user-info">
            <div class="user-name" id="sidebarUsername">Loading...</div>
            <div class="user-role" id="sidebarRole">Member</div>
          </div>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">
          <span id="themeIcon">☀️</span>
          <span id="themeLabel">Light Mode</span>
          <div class="toggle-switch"></div>
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <header class="topbar">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <h1 id="pageTitle">Profile</h1>
        <div class="topbar-actions" style="margin-left:auto">
          <button class="btn btn-ghost btn-sm" onclick="history.back()">← Back</button>
        </div>
      </header>

      <div class="content-area" style="max-width:800px">
        <div id="profileLoader" class="loader"><div class="spinner"></div></div>
        <div id="profileContent" style="display:none">

          <div class="profile-header-card">
            <div class="profile-cover"></div>
            <div class="profile-info">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
                <div class="profile-avatar-wrapper">
                  <img class="profile-avatar" id="profileAvatar" alt="avatar" onerror="handleAvatarError(this)" />
                </div>
                <div class="profile-actions" id="profileActions"></div>
              </div>
              <h2 id="profileUsername"></h2>
              <p class="profile-bio" id="profileBio"></p>
              <p class="profile-joined" id="profileJoined"></p>
              <div class="profile-stats">
                <div class="stat-item">
                  <div class="stat-num" id="statPosts">0</div>
                  <div class="stat-label">Posts</div>
                </div>
                <div class="stat-item" style="cursor:pointer" onclick="openFollowers()">
                  <div class="stat-num" id="statFollowers">0</div>
                  <div class="stat-label">Followers</div>
                </div>
                <div class="stat-item" style="cursor:pointer" onclick="openFollowing()">
                  <div class="stat-num" id="statFollowing">0</div>
                  <div class="stat-label">Following</div>
                </div>
              </div>
            </div>
          </div>

          <div class="tabs">
            <button class="tab-btn active" onclick="switchProfileTab('posts', this)">Posts</button>
          </div>

          <div id="profilePosts"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- EDIT PROFILE MODAL -->
  <div class="modal-overlay" id="editProfileModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Edit Profile</h3>
        <button class="modal-close" onclick="closeModal('editProfileModal')">✕</button>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="editUsername" placeholder="Username" />
      </div>
      <div class="form-group">
        <label>Bio</label>
        <textarea id="editBio" placeholder="Tell something about yourself..." style="background:var(--bg-secondary);border:1.5px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-size:14px;resize:none;height:80px;width:100%;font-family:inherit"></textarea>
      </div>
      <div class="form-group">
        <label>Profile Picture</label>
        <input type="file" id="editAvatar" accept="image/*" />
      </div>
      <div id="editProfileError" class="form-error" style="display:none;margin-top:12px"></div>
      <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end">
        <button class="btn btn-ghost" onclick="closeModal('editProfileModal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- FOLLOWERS/FOLLOWING MODAL -->
  <div class="modal-overlay" id="followersModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="followersModalTitle">Followers</h3>
        <button class="modal-close" onclick="closeModal('followersModal')">✕</button>
      </div>
      <div id="followersList"></div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/app.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
